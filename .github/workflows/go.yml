name: Go build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev xvfb

      - name: Start virtual display
        run: Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test with coverage
        env:
          DISPLAY: :99
        run: go test -coverprofile coverage.out -covermode atomic ./...

      - name: Generate coverage reports
        run: |
          go tool cover -func coverage.out | tee coverage-summary.txt
          go tool cover -html coverage.out -o coverage.html
          {
            echo "## Go Coverage"
            echo
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: |
            coverage.out
            coverage-summary.txt
            coverage.html
          if-no-files-found: error

  build:
    name: Build (${{ matrix.artifact }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-amd64
            binary: build/tower-defense-linux-amd64
          - os: windows-latest
            artifact: windows-amd64
            binary: build/tower-defense-windows-amd64.exe
          - os: macos-15
            artifact: darwin-arm64
            binary: build/tower-defense-darwin-arm64
          - os: macos-15-intel
            artifact: darwin-amd64
            binary: build/tower-defense-darwin-amd64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev xvfb

      - name: Start virtual display
        if: runner.os == 'Linux'
        run: Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        env:
          DISPLAY: :99
        run: go test ./...

      - name: Create build directory
        run: mkdir -p build
        shell: bash

      - name: Build binary
        run: go build -v -o ${{ matrix.binary }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: tower-defense-${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
