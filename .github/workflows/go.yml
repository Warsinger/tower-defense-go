name: Go build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-amd64
            binary: build/tower-defense-linux-amd64
          - os: windows-latest
            artifact: windows-amd64
            binary: build/tower-defense-windows-amd64.exe
          - os: macos-latest
            artifact: darwin-arm64
            binary: build/tower-defense-darwin-arm64
          - os: macos-15-intel
            artifact: darwin-amd64
            binary: build/tower-defense-darwin-amd64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev xvfb

      - name: Start virtual display
        if: runner.os == 'Linux'
        run: Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Locate Go caches
        id: go-cache-paths
        shell: bash
        run: |
          echo "gomodcache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "gocache=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ${{ steps.go-cache-paths.outputs.gomodcache }}
          key: ${{ runner.os }}-go-mod-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Cache Go build outputs
        uses: actions/cache@v5
        with:
          path: ${{ steps.go-cache-paths.outputs.gocache }}
          key: ${{ runner.os }}-go-build-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Test
        env:
          DISPLAY: :99
        run: go test ./...

      - name: Create build directory
        run: mkdir -p build
        shell: bash

      - name: Build binary
        run: go build -v -o ${{ matrix.binary }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: tower-defense-${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
